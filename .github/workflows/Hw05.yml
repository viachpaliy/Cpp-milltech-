name: Homework 05 Test

on: [push, pull_request]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        # Вказуємо шлях до папки проекту
        working-directory: ./homework_05
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        working-directory: ./homework_05
        run: cmake --build build --config Release

      - name: Process Files
        working-directory: ./homework_05
        shell: bash
        run: |
          # Шлях до бінарного файлу
          EXE="./build/telemetry_check"
          # Шлях до папки з вхідними даними
          DATA_DIR="./homework_05/data"

          echo "🚀 Починаємо перевірку файлів..."
          
          # Перевіряємо чи існує файл та папка
          if [ ! -d "$DATA_DIR" ]; then echo "Папка $DATA_DIR не знайдена!"; exit 1; fi

          for file in "$DATA_DIR"/*; do
            if [ -f "$file" ]; then
              echo "--- Обробка: $file ---"
              # Запуск. Якщо програма "впаде", скрипт зупиниться і CI засвітиться червоним
              $EXE "$file" || { echo "❌ Помилка при обробці $file"; exit 1; }
            fi
          done
          
          echo "✅ Всі файли успішно оброблені!"

        shell: bash
        run: |
          # Шлях до вашого exe (змініть 'my_app' на назву з CMakeLists.txt)
          EXE_PATH="./build/my_app"
          # Шлях до папки з даними
          DATA_DIR="./data_folder"

          echo "Starting tests..."
          
          for file in "$DATA_DIR"/*; do
            if [ -f "$file" ]; then
              echo "Testing: $file"
              # Запуск. Якщо програма поверне код не 0, CI зупиниться з помилкою
              $EXE_PATH "$file" || { echo "Failed on $file"; exit 1; }
            fi
          done
          
          echo "All files processed successfully!"
          
