name: Homework 05 Test

on: [push, pull_request]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure CMake
        working-directory: ./homework_05
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        working-directory: ./homework_05
        run: cmake --build build --config Release

      - name: Verify Build
        working-directory: ./homework_05
        run: |
          if [ ! -f "./build/telemetry_check" ]; then
            echo "❌ Помилка: Виконуваний файл telemetry_check не знайдено в папці build!"
            echo "Перевірте назву в add_executable() у CMakeLists.txt"
            exit 1
          fi
          echo "✅ Файл telemetry_check успішно" 

      - name: Process Files
        working-directory: ./homework_05
        shell: bash
        run: |
          # Назва вашого виконуваного файлу
          EXE="./build/telemetry_check"
          # Шлях до папки з даними (відносно homework_05)
          DATA_DIR="./data"

          echo "🚀 Починаємо перевірку телеметрії..."
          
          if [ ! -d "$DATA_DIR" ]; then 
            echo "❌ Помилка: Папка $DATA_DIR не знайдена в $(pwd)"
            exit 1
          fi

          for file in "$DATA_DIR"/*; do
            if [ -f "$file" ]; then
              echo "--- Обробка файлу: $file ---"
              # Запуск програми з передачею файлу як аргументу
              $EXE "$file" || { echo "❌ Програма впала на файлі $file"; exit 1; }
            fi
          done
          
          echo "✅ Перевірку завершено: всі файли оброблені без помилок!"

          # Шлях до бінарного файлу
          EXE="./build/telemetry_check"
          # Шлях до папки з вхідними даними
          DATA_DIR="./homework_05/data"

          echo "🚀 Починаємо перевірку файлів..."
          
          # Перевіряємо чи існує файл та папка
          if [ ! -d "$DATA_DIR" ]; then echo "Папка $DATA_DIR не знайдена!"; exit 1; fi

          for file in "$DATA_DIR"/*; do
            if [ -f "$file" ]; then
              echo "--- Обробка: $file ---"
              # Запуск. Якщо програма "впаде", скрипт зупиниться і CI засвітиться червоним
              $EXE "$file" || { echo "❌ Помилка при обробці $file"; exit 1; }
            fi
          done
          
          echo "✅ Всі файли успішно оброблені!"

        